<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MoneyHoney 💕 — Personal Finance</title>
<meta name="description" content="MoneyHoney: A beautiful personal finance tracker for South African women">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
tailwind.config={theme:{extend:{colors:{p1:'#FFE9EF',p2:'#FFC9D7',p3:'#FFBCCD',p4:'#FF9CB5',p5:'#FC809F',pm:'#3D0C1F'},fontFamily:{sans:['Outfit','sans-serif']}}}}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:#FFE9EF;color:#3D0C1F}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#FFE9EF}::-webkit-scrollbar-thumb{background:#FFC9D7;border-radius:3px}
.page{display:none;animation:fadeIn .3s ease}.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-pink{0%,100%{box-shadow:0 0 0 0 rgba(252,128,159,.4)}70%{box-shadow:0 0 0 10px rgba(252,128,159,0)}}
@keyframes celebrate{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 4px 20px rgba(252,128,159,.12);border:1px solid #FFBCCD;transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(252,128,159,.2)}
.btn{background:#FC809F;color:#fff;border:none;padding:10px 20px;border-radius:12px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .2s}
.btn:hover{background:#FF9CB5;transform:scale(1.02)}
.btn-outline{background:transparent;color:#FC809F;border:2px solid #FC809F}
.btn-outline:hover{background:#FFE9EF}
.btn-sm{padding:6px 14px;font-size:13px;border-radius:8px}
input,select,textarea{width:100%;padding:10px 14px;border:2px solid #FFBCCD;border-radius:10px;font-family:inherit;color:#3D0C1F;background:#fff;outline:none;transition:border .2s,box-shadow .2s}
input:focus,select:focus,textarea:focus{border-color:#FC809F;box-shadow:0 0 0 3px rgba(252,128,159,.2)}
.sidebar{width:240px;background:#fff;border-right:2px solid #FFBCCD;height:100vh;position:fixed;left:0;top:0;padding:20px 0;z-index:50;overflow-y:auto}
.sidebar .logo{text-align:center;font-size:22px;font-weight:700;color:#FC809F;padding:0 20px 24px;border-bottom:2px solid #FFE9EF}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 24px;cursor:pointer;transition:all .2s;font-weight:500;color:#3D0C1F;border-left:3px solid transparent}
.nav-item:hover,.nav-item.active{background:#FFE9EF;color:#FC809F;border-left-color:#FC809F}
.main{margin-left:240px;padding:24px;min-height:100vh}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #FFBCCD;z-index:50;padding:6px 0}
.bottom-nav .bnav-item{display:flex;flex-direction:column;align-items:center;font-size:11px;padding:4px;cursor:pointer;color:#3D0C1F;transition:color .2s}
.bottom-nav .bnav-item.active{color:#FC809F}
.progress-bar{background:#FFE9EF;border-radius:10px;height:12px;overflow:hidden}
.progress-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#FFC9D7,#FC809F);transition:width .5s ease}
.modal-overlay{position:fixed;inset:0;background:rgba(61,12,31,.4);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.modal{background:#fff;border-radius:20px;padding:28px;max-width:500px;width:90%;max-height:85vh;overflow-y:auto;border:2px solid #FFBCCD}
.empty-state{text-align:center;padding:60px 20px;color:#FC809F}
.empty-state .emoji{font-size:48px;margin-bottom:16px}
.tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;background:#FFE9EF;color:#FC809F}
.table-row{display:grid;padding:12px 16px;border-bottom:1px solid #FFE9EF;align-items:center;transition:background .2s}
.table-row:hover{background:#FFE9EF}
@media(max-width:768px){
.sidebar{display:none}.main{margin-left:0;padding:16px;padding-bottom:80px}
.bottom-nav{display:flex;justify-content:space-around}
}
</style>
</head>
<body>
<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
<div class="logo">MoneyHoney 💕</div>
<div style="padding-top:16px">
<div class="nav-item active" data-page="dashboard" onclick="showPage('dashboard')">🏠 Dashboard</div>
<div class="nav-item" data-page="income" onclick="showPage('income')">💸 Income</div>
<div class="nav-item" data-page="expenses" onclick="showPage('expenses')">🛍️ Expenses</div>
<div class="nav-item" data-page="savings" onclick="showPage('savings')">💰 Savings Goals</div>
<div class="nav-item" data-page="budget" onclick="showPage('budget')">📊 Budget</div>
<div class="nav-item" data-page="bills" onclick="showPage('bills')">🔔 Bills</div>
<div class="nav-item" data-page="insights" onclick="showPage('insights')">📈 Insights</div>
<div class="nav-item" data-page="settings" onclick="showPage('settings')">⚙️ Settings</div>
</div>
</nav>
<!-- BOTTOM NAV -->
<nav class="bottom-nav" id="bottomNav">
<div class="bnav-item active" data-page="dashboard" onclick="showPage('dashboard')">🏠<span>Home</span></div>
<div class="bnav-item" data-page="expenses" onclick="showPage('expenses')">🛍️<span>Spend</span></div>
<div class="bnav-item" data-page="savings" onclick="showPage('savings')">💰<span>Save</span></div>
<div class="bnav-item" data-page="budget" onclick="showPage('budget')">📊<span>Budget</span></div>
<div class="bnav-item" data-page="settings" onclick="showPage('settings')">⚙️<span>More</span></div>
</nav>
<!-- MAIN CONTENT -->
<main class="main" id="mainContent">

<!-- DASHBOARD -->
<div class="page active" id="page-dashboard"></div>

<!-- INCOME -->
<div class="page" id="page-income"></div>

<!-- EXPENSES -->
<div class="page" id="page-expenses"></div>

<!-- SAVINGS -->
<div class="page" id="page-savings"></div>

<!-- BUDGET -->
<div class="page" id="page-budget"></div>

<!-- BILLS -->
<div class="page" id="page-bills"></div>

<!-- INSIGHTS -->
<div class="page" id="page-insights"></div>

<!-- SETTINGS -->
<div class="page" id="page-settings"></div>

<!-- FORECAST -->
<div class="page" id="page-forecast"></div>

</main>

<!-- MODAL CONTAINER -->
<div id="modalContainer"></div>

<script>
// ===== DATA LAYER =====
const DB={
  get(k){try{return JSON.parse(localStorage.getItem('mh_'+k))||null}catch{return null}},
  set(k,v){localStorage.setItem('mh_'+k,JSON.stringify(v))},
  remove(k){localStorage.removeItem('mh_'+k)}
};
function getSettings(){return DB.get('settings')||{name:'Gorgeous',salaryDay:25,salaryAmount:0,budgetResetDay:1}}
function saveSettings(s){DB.set('settings',s)}
function getIncomes(){return DB.get('incomes')||[]}
function saveIncomes(d){DB.set('incomes',d)}
function getExpenses(){return DB.get('expenses')||[]}
function saveExpenses(d){DB.set('expenses',d)}
function getGoals(){return DB.get('goals')||[]}
function saveGoals(d){DB.set('goals',d)}
function getBudgets(){return DB.get('budgets')||[]}
function saveBudgets(d){DB.set('budgets',d)}
function getBills(){return DB.get('bills')||[]}
function saveBills(d){DB.set('bills',d)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function R(n){return'R '+Number(n||0).toLocaleString('en-ZA',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtDate(d){const dt=new Date(d);return dt.toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'})}
function thisMonth(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function isThisMonth(dateStr){return dateStr&&dateStr.startsWith(thisMonth())}
function daysInMonth(y,m){return new Date(y,m,0).getDate()}
function today(){return new Date().toISOString().slice(0,10)}

const CATEGORIES=[
  {id:'groceries',name:'Groceries',icon:'🛒'},
  {id:'clothing',name:'Clothing & Beauty',icon:'👗'},
  {id:'eating_out',name:'Eating Out',icon:'🍽️'},
  {id:'transport',name:'Transport',icon:'🚗'},
  {id:'self_care',name:'Self Care',icon:'💅'},
  {id:'rent',name:'Rent & Utilities',icon:'🏠'},
  {id:'subscriptions',name:'Subscriptions',icon:'📱'},
  {id:'health',name:'Health',icon:'💊'},
  {id:'gifts',name:'Gifts',icon:'🎁'},
  {id:'education',name:'Education',icon:'📚'},
  {id:'entertainment',name:'Entertainment',icon:'💃'},
  {id:'other',name:'Other',icon:'📦'}
];
const PAYMENT_METHODS=['Cash','Card','EFT','SnapScan','Zapper'];
function catInfo(id){return CATEGORIES.find(c=>c.id===id)||{name:'Other',icon:'📦'}}

// ===== NAVIGATION =====
function showPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('.nav-item,.bnav-item').forEach(n=>{
    n.classList.toggle('active',n.dataset.page===page);
  });
  window['render_'+page]&&window['render_'+page]();
}

// ===== MODAL =====
function showModal(html){document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`}
function closeModal(){document.getElementById('modalContainer').innerHTML=''}

// ===== CHARTS HELPER =====
const chartInstances={};
function makeChart(canvasId,config){
  if(chartInstances[canvasId]){chartInstances[canvasId].destroy()}
  const ctx=document.getElementById(canvasId);
  if(!ctx)return null;
  chartInstances[canvasId]=new Chart(ctx,config);
  return chartInstances[canvasId];
}

// ===== DASHBOARD =====
window.render_dashboard=function(){
  const s=getSettings(),inc=getIncomes(),exp=getExpenses(),goals=getGoals(),bills=getBills();
  const mInc=inc.filter(i=>isThisMonth(i.date)&&i.status==='received').reduce((a,i)=>a+Number(i.amount),0);
  const mExp=exp.filter(e=>isThisMonth(e.date)).reduce((a,e)=>a+Number(e.amount),0);
  const mSav=goals.reduce((a,g)=>{return a+(g.contributions||[]).filter(c=>isThisMonth(c.date)).reduce((s,c)=>s+Number(c.amount),0)},0);
  const remaining=mInc-mExp-mSav;
  const now=new Date();
  const dIM=daysInMonth(now.getFullYear(),now.getMonth()+1);
  const dayOfMonth=now.getDate();
  const pctMonth=(dayOfMonth/dIM*100).toFixed(0);
  const upcoming=bills.filter(b=>{
    const due=Number(b.dueDay);const diff=due-dayOfMonth;
    const paid=(b.paidMonths||[]).includes(thisMonth());
    return!paid&&diff>=0&&diff<=7;
  });
  const recent=exp.sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);

  document.getElementById('page-dashboard').innerHTML=`
  <div class="card mb-4" style="background:linear-gradient(135deg,#FC809F,#FFC9D7);color:#fff;border:none">
    <h1 class="text-2xl font-bold">Hey ${s.name} 💕</h1>
    <p class="mt-1 opacity-90">${now.toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p>
  </div>
  ${upcoming.length?`<div class="card mb-4" style="border-color:#FC809F;background:#FFE9EF"><p class="font-semibold">🔔 ${upcoming.length} bill${upcoming.length>1?'s':''} due in the next 7 days</p><div class="mt-2">${upcoming.map(b=>`<span class="tag mr-2 mb-1">${b.name} — ${R(b.amount)}</span>`).join('')}</div></div>`:''}
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
    <div class="card"><p class="text-sm opacity-70">Income</p><p class="text-xl font-bold mt-1" style="color:#FC809F">${R(mInc)}</p></div>
    <div class="card"><p class="text-sm opacity-70">Spent</p><p class="text-xl font-bold mt-1" style="color:#FC809F">${R(mExp)}</p></div>
    <div class="card"><p class="text-sm opacity-70">Remaining</p><p class="text-xl font-bold mt-1" style="color:#FC809F">${R(remaining)}</p></div>
    <div class="card"><p class="text-sm opacity-70">Saved</p><p class="text-xl font-bold mt-1" style="color:#FC809F">${R(mSav)}</p></div>
  </div>
  <div class="grid lg:grid-cols-2 gap-4 mb-6">
    <div class="card"><h3 class="font-semibold mb-3">Money Split</h3><div style="max-height:220px;display:flex;justify-content:center"><canvas id="dashDonut"></canvas></div></div>
    <div class="card"><h3 class="font-semibold mb-3">Month Progress</h3>
      <p class="text-sm mb-2">Day ${dayOfMonth} of ${dIM} (${pctMonth}% through the month)</p>
      <div class="progress-bar" style="height:18px"><div class="progress-fill" style="width:${pctMonth}%"></div></div>
      <div class="mt-4 text-sm"><p>At current spend rate: <strong>${R(mExp/dayOfMonth*dIM)}</strong> projected total spend</p><p class="mt-1">Projected remaining: <strong>${R(mInc-(mExp/dayOfMonth*dIM)-mSav)}</strong></p></div>
    </div>
  </div>
  <div class="card">
    <h3 class="font-semibold mb-3">Recent Transactions</h3>
    ${recent.length?recent.map(e=>`<div class="table-row" style="grid-template-columns:auto 1fr auto"><span>${catInfo(e.category).icon}</span><div><p class="font-medium">${e.merchant}</p><p class="text-xs opacity-60">${fmtDate(e.date)}</p></div><span class="font-semibold" style="color:#FC809F">${R(e.amount)}</span></div>`).join(''):'<div class="empty-state"><div class="emoji">🛍️</div><p>No expenses yet this month</p></div>'}
  </div>`;

  makeChart('dashDonut',{type:'doughnut',data:{labels:['Spent','Saved','Remaining'],datasets:[{data:[mExp||0,mSav||0,Math.max(0,remaining)||0],backgroundColor:['#FC809F','#FFC9D7','#FFE9EF'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'bottom',labels:{color:'#3D0C1F'}}}}});
};

// ===== INCOME =====
window.render_income=function(){
  const incomes=getIncomes();
  const mInc=incomes.filter(i=>isThisMonth(i.date));
  const mTotal=mInc.filter(i=>i.status==='received').reduce((a,i)=>a+Number(i.amount),0);
  document.getElementById('page-income').innerHTML=`
  <div class="flex justify-between items-center mb-4"><h2 class="text-2xl font-bold">💸 Income</h2><button class="btn" onclick="showIncomeModal()">+ Add Income</button></div>
  <div class="card mb-4"><p class="text-sm opacity-70">This Month's Income</p><p class="text-2xl font-bold" style="color:#FC809F">${R(mTotal)}</p></div>
  <div class="card">
    <h3 class="font-semibold mb-3">Income History</h3>
    ${incomes.length?incomes.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(i=>`
    <div class="table-row" style="grid-template-columns:1fr auto auto auto">
      <div><p class="font-medium">${i.source}</p><p class="text-xs opacity-60">${fmtDate(i.date)}${i.notes?' — '+i.notes:''}</p></div>
      <span class="tag">${i.status}</span>
      <span class="font-semibold" style="color:#FC809F">${R(i.amount)}</span>
      <button class="btn btn-sm btn-outline" onclick="deleteIncome('${i.id}')">✕</button>
    </div>`).join(''):'<div class="empty-state"><div class="emoji">💸</div><p>No income logged yet</p></div>'}
  </div>`;
};
window.showIncomeModal=function(){
  const s=getSettings();
  showModal(`<h3 class="text-lg font-bold mb-4">Add Income</h3>
  <div class="space-y-3">
    <div><label class="text-sm font-medium">Source</label><input id="incSource" value="${s.salaryAmount?'Salary':''}" placeholder="e.g. Salary, Freelance"></div>
    <div><label class="text-sm font-medium">Amount (R)</label><input id="incAmount" type="number" value="${s.salaryAmount||''}"></div>
    <div><label class="text-sm font-medium">Date</label><input id="incDate" type="date" value="${today()}"></div>
    <div><label class="text-sm font-medium">Status</label><select id="incStatus"><option value="received">Received</option><option value="expected">Expected</option></select></div>
    <div><label class="text-sm font-medium">Notes</label><input id="incNotes" placeholder="Optional"></div>
    <button class="btn w-full" onclick="addIncome()">Save Income 💕</button>
  </div>`);
};
window.addIncome=function(){
  const inc=getIncomes();
  inc.push({id:uid(),source:document.getElementById('incSource').value,amount:document.getElementById('incAmount').value,date:document.getElementById('incDate').value,status:document.getElementById('incStatus').value,notes:document.getElementById('incNotes').value});
  saveIncomes(inc);closeModal();render_income();
};
window.deleteIncome=function(id){const inc=getIncomes().filter(i=>i.id!==id);saveIncomes(inc);render_income()};

// ===== EXPENSES =====
let expFilter={cat:'all',method:'all',search:'',from:'',to:''};
window.render_expenses=function(){
  let exps=getExpenses().sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(expFilter.cat!=='all')exps=exps.filter(e=>e.category===expFilter.cat);
  if(expFilter.method!=='all')exps=exps.filter(e=>e.payMethod===expFilter.method);
  if(expFilter.search)exps=exps.filter(e=>e.merchant.toLowerCase().includes(expFilter.search.toLowerCase()));
  if(expFilter.from)exps=exps.filter(e=>e.date>=expFilter.from);
  if(expFilter.to)exps=exps.filter(e=>e.date<=expFilter.to);
  const total=exps.reduce((a,e)=>a+Number(e.amount),0);
  document.getElementById('page-expenses').innerHTML=`
  <div class="flex justify-between items-center mb-4"><h2 class="text-2xl font-bold">🛍️ Expenses</h2><div class="flex gap-2"><button class="btn btn-sm btn-outline" onclick="exportCSV()">📥 CSV</button><button class="btn" onclick="showExpenseModal()">+ Add</button></div></div>
  <div class="card mb-4"><div class="grid grid-cols-2 md:grid-cols-5 gap-3">
    <input placeholder="🔍 Search merchant" value="${expFilter.search}" oninput="expFilter.search=this.value;render_expenses()">
    <select onchange="expFilter.cat=this.value;render_expenses()"><option value="all">All Categories</option>${CATEGORIES.map(c=>`<option value="${c.id}"${expFilter.cat===c.id?' selected':''}>${c.icon} ${c.name}</option>`).join('')}</select>
    <select onchange="expFilter.method=this.value;render_expenses()"><option value="all">All Methods</option>${PAYMENT_METHODS.map(m=>`<option value="${m}"${expFilter.method===m?' selected':''}>${m}</option>`).join('')}</select>
    <input type="date" value="${expFilter.from}" onchange="expFilter.from=this.value;render_expenses()" placeholder="From">
    <input type="date" value="${expFilter.to}" onchange="expFilter.to=this.value;render_expenses()" placeholder="To">
  </div></div>
  <div class="card mb-4"><p class="text-sm opacity-70">Filtered Total</p><p class="text-2xl font-bold" style="color:#FC809F">${R(total)}</p><p class="text-sm opacity-50">${exps.length} transaction${exps.length!==1?'s':''}</p></div>
  <div class="card">
    ${exps.length?exps.map(e=>`<div class="table-row" style="grid-template-columns:auto 1fr auto auto auto">
      <span class="text-xl">${catInfo(e.category).icon}</span>
      <div><p class="font-medium">${e.merchant}</p><p class="text-xs opacity-60">${fmtDate(e.date)} · ${e.payMethod||''}${e.notes?' · '+e.notes:''}</p></div>
      <span class="tag">${catInfo(e.category).name}</span>
      <span class="font-semibold" style="color:#FC809F">${R(e.amount)}</span>
      <div class="flex gap-1"><button class="btn btn-sm btn-outline" onclick="showExpenseModal('${e.id}')">✏️</button><button class="btn btn-sm btn-outline" onclick="deleteExpense('${e.id}')">✕</button></div>
    </div>`).join(''):'<div class="empty-state"><div class="emoji">🛍️</div><p>No expenses found</p><p class="text-sm mt-2 opacity-60">Add your first expense to start tracking!</p></div>'}
  </div>`;
};
window.showExpenseModal=function(editId){
  const e=editId?getExpenses().find(x=>x.id===editId):{};
  showModal(`<h3 class="text-lg font-bold mb-4">${editId?'Edit':'Add'} Expense</h3>
  <div class="space-y-3">
    <div><label class="text-sm font-medium">Merchant</label><input id="expMerchant" value="${e.merchant||''}" placeholder="e.g. Woolworths, Uber"></div>
    <div><label class="text-sm font-medium">Amount (R)</label><input id="expAmount" type="number" step="0.01" value="${e.amount||''}"></div>
    <div><label class="text-sm font-medium">Date</label><input id="expDate" type="date" value="${e.date||today()}"></div>
    <div><label class="text-sm font-medium">Category</label><select id="expCat">${CATEGORIES.map(c=>`<option value="${c.id}"${e.category===c.id?' selected':''}>${c.icon} ${c.name}</option>`).join('')}</select></div>
    <div><label class="text-sm font-medium">Payment Method</label><select id="expMethod">${PAYMENT_METHODS.map(m=>`<option value="${m}"${e.payMethod===m?' selected':''}>${m}</option>`).join('')}</select></div>
    <div><label class="text-sm font-medium">Notes</label><input id="expNotes" value="${e.notes||''}" placeholder="Optional"></div>
    <div><label class="text-sm font-medium">Receipt Ref</label><input id="expReceipt" value="${e.receipt||''}" placeholder="Receipt or order ID"></div>
    <button class="btn w-full" onclick="saveExpense('${editId||''}')">Save Expense 💕</button>
  </div>`);
};
window.saveExpense=function(editId){
  const exps=getExpenses();
  const data={merchant:document.getElementById('expMerchant').value,amount:document.getElementById('expAmount').value,date:document.getElementById('expDate').value,category:document.getElementById('expCat').value,payMethod:document.getElementById('expMethod').value,notes:document.getElementById('expNotes').value,receipt:document.getElementById('expReceipt').value};
  if(editId){const i=exps.findIndex(e=>e.id===editId);if(i>=0)exps[i]={...exps[i],...data}}
  else{exps.push({id:uid(),...data})}
  saveExpenses(exps);closeModal();render_expenses();
};
window.deleteExpense=function(id){saveExpenses(getExpenses().filter(e=>e.id!==id));render_expenses()};
window.exportCSV=function(){
  const exps=getExpenses();if(!exps.length)return alert('No expenses to export');
  let csv='Date,Merchant,Amount,Category,Payment Method,Notes,Receipt\n';
  exps.forEach(e=>{csv+=`${e.date},"${e.merchant}",${e.amount},${catInfo(e.category).name},${e.payMethod||''},"${e.notes||''}","${e.receipt||''}"\n`});
  const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='moneyhoney_expenses.csv';a.click();URL.revokeObjectURL(url);
};

// ===== BUDGET =====
window.render_budget=function(){
  const budgets=getBudgets();const exps=getExpenses().filter(e=>isThisMonth(e.date));
  const overCount=budgets.filter(b=>{const spent=exps.filter(e=>e.category===b.category).reduce((a,e)=>a+Number(e.amount),0);return spent>Number(b.limit)}).length;
  document.getElementById('page-budget').innerHTML=`
  <div class="flex justify-between items-center mb-4"><h2 class="text-2xl font-bold">📊 Budget</h2><button class="btn" onclick="showBudgetModal()">+ Set Limit</button></div>
  ${overCount?`<div class="card mb-4" style="border-color:#FC809F;animation:pulse-pink 2s infinite"><p class="font-semibold" style="color:#FC809F">⚠️ ${overCount} categor${overCount>1?'ies':'y'} over budget this month!</p></div>`:''}
  ${budgets.length?`<div class="space-y-3">${budgets.map(b=>{
    const cat=catInfo(b.category);
    const spent=exps.filter(e=>e.category===b.category).reduce((a,e)=>a+Number(e.amount),0);
    const pct=Number(b.limit)>0?(spent/Number(b.limit)*100):0;
    const status=pct>100?'over':pct>70?'watch':'safe';
    const barStyle=status==='over'?'animation:pulse-pink 2s infinite':'';
    return`<div class="card" style="${status==='over'?'border-color:#FC809F':''}">
      <div class="flex justify-between items-center mb-2"><span class="font-medium">${cat.icon} ${cat.name}</span><div class="flex gap-2 items-center"><span class="text-sm">${R(spent)} / ${R(b.limit)}</span><button class="btn btn-sm btn-outline" onclick="deleteBudget('${b.id}')">✕</button></div></div>
      <div class="progress-bar" style="${barStyle}"><div class="progress-fill" style="width:${Math.min(100,pct)}%"></div></div>
      <p class="text-xs mt-1 opacity-60">${pct.toFixed(0)}% used${status==='over'?' — Over budget!':status==='watch'?' — Watch spending':' — Looking good'}</p>
    </div>`}).join('')}</div>`:'<div class="card"><div class="empty-state"><div class="emoji">📊</div><p>No budget limits set</p></div></div>'}`;
};

// ===== INSIGHTS =====
function getMonthKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function getLast6Months(){const m=[];for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);m.push(getMonthKey(d))}return m}
window.render_insights=function(){
  const exps=getExpenses(),inc=getIncomes(),now=new Date();
  const mExps=exps.filter(e=>isThisMonth(e.date));
  const mTotal=mExps.reduce((a,e)=>a+Number(e.amount),0);
  const mInc=inc.filter(i=>isThisMonth(i.date)&&i.status==='received').reduce((a,i)=>a+Number(i.amount),0);
  const dayOfMonth=now.getDate();
  const avgDaily=dayOfMonth>0?(mTotal/dayOfMonth):0;
  const biggest=mExps.sort((a,b)=>Number(b.amount)-Number(a.amount))[0];
  const catTotals={};mExps.forEach(e=>{catTotals[e.category]=(catTotals[e.category]||0)+Number(e.amount)});
  const topCats=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const savRate=mInc>0?((mInc-mTotal)/mInc*100).toFixed(1):0;
  const months6=getLast6Months();
  const mIncByMonth=months6.map(m=>inc.filter(i=>i.date&&i.date.startsWith(m)&&i.status==='received').reduce((a,i)=>a+Number(i.amount),0));
  const mExpByMonth=months6.map(m=>exps.filter(e=>e.date&&e.date.startsWith(m)).reduce((a,e)=>a+Number(e.amount),0));
  const prevMonth=new Date();prevMonth.setMonth(prevMonth.getMonth()-1);const pmKey=getMonthKey(prevMonth);
  const prevTotal=exps.filter(e=>e.date&&e.date.startsWith(pmKey)).reduce((a,e)=>a+Number(e.amount),0);
  const moreOrLess=mTotal>prevTotal?`Spent ${R(mTotal-prevTotal)} more than last month`:`Spent ${R(prevTotal-mTotal)} less than last month`;

  document.getElementById('page-insights').innerHTML=`
  <h2 class="text-2xl font-bold mb-4">📈 Spending Insights</h2>
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
    <div class="card"><p class="text-sm opacity-70">Avg Daily Spend</p><p class="text-xl font-bold" style="color:#FC809F">${R(avgDaily)}</p></div>
    <div class="card"><p class="text-sm opacity-70">Savings Rate</p><p class="text-xl font-bold" style="color:#FC809F">${savRate}%</p></div>
    <div class="card"><p class="text-sm opacity-70">Biggest Expense</p><p class="text-lg font-bold" style="color:#FC809F">${biggest?R(biggest.amount):'—'}</p><p class="text-xs opacity-60">${biggest?biggest.merchant:''}</p></div>
    <div class="card"><p class="text-sm opacity-70">vs Last Month</p><p class="text-sm font-medium mt-1" style="color:#FC809F">${prevTotal>0?moreOrLess:'No data yet'}</p></div>
  </div>
  <div class="card mb-4"><h3 class="font-semibold mb-2">Top Categories</h3>${topCats.length?topCats.map(([id,amt])=>{const c=catInfo(id);return`<div class="flex justify-between items-center py-2 border-b" style="border-color:#FFE9EF"><span>${c.icon} ${c.name}</span><span class="font-bold" style="color:#FC809F">${R(amt)}</span></div>`}).join(''):'<p class="text-sm opacity-60">No expenses yet</p>'}</div>
  <div class="grid lg:grid-cols-2 gap-4 mb-6">
    <div class="card"><h3 class="font-semibold mb-3">Spending by Category</h3><div style="max-height:280px;display:flex;justify-content:center"><canvas id="insightDonut"></canvas></div></div>
    <div class="card"><h3 class="font-semibold mb-3">Income vs Expenses (6 Months)</h3><canvas id="insightBar" height="200"></canvas></div>
  </div>
  <div class="card"><h3 class="font-semibold mb-3">Daily Spending This Month</h3><canvas id="insightLine" height="150"></canvas></div>`;

  const catLabels=Object.keys(catTotals).map(id=>catInfo(id).name);
  const catVals=Object.values(catTotals);
  const pinkShades=['#FC809F','#FF9CB5','#FFBCCD','#FFC9D7','#FFE9EF','#f7a6bd','#e8769a','#ffb3c6','#ffd6e0','#ffe0e8','#f9c5d1','#fce4ec'];
  makeChart('insightDonut',{type:'doughnut',data:{labels:catLabels,datasets:[{data:catVals,backgroundColor:pinkShades.slice(0,catVals.length),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'bottom',labels:{color:'#3D0C1F'}}}}});
  const monthLabels=months6.map(m=>{const[y,mo]=m.split('-');return new Date(y,mo-1).toLocaleDateString('en-ZA',{month:'short'})});
  makeChart('insightBar',{type:'bar',data:{labels:monthLabels,datasets:[{label:'Income',data:mIncByMonth,backgroundColor:'#FFC9D7'},{label:'Expenses',data:mExpByMonth,backgroundColor:'#FC809F'}]},options:{responsive:true,plugins:{legend:{labels:{color:'#3D0C1F'}}},scales:{x:{ticks:{color:'#3D0C1F'}},y:{ticks:{color:'#3D0C1F',callback:v=>'R'+v}}}}});
  const dIM=daysInMonth(now.getFullYear(),now.getMonth()+1);
  const dailySpend=Array(dIM).fill(0);
  mExps.forEach(e=>{const d=new Date(e.date).getDate();if(d>=1&&d<=dIM)dailySpend[d-1]+=Number(e.amount)});
  makeChart('insightLine',{type:'line',data:{labels:Array.from({length:dIM},(_,i)=>i+1),datasets:[{label:'Daily Spend',data:dailySpend,borderColor:'#FC809F',backgroundColor:'rgba(252,128,159,0.1)',fill:true,tension:.3,pointBackgroundColor:'#FC809F'}]},options:{responsive:true,plugins:{legend:{labels:{color:'#3D0C1F'}}},scales:{x:{ticks:{color:'#3D0C1F'}},y:{ticks:{color:'#3D0C1F',callback:v=>'R'+v}}}}});
};

// ===== FORECAST =====
window.render_forecast=function(){
  const inc=getIncomes(),exps=getExpenses(),bills=getBills(),now=new Date();
  const mInc=inc.filter(i=>isThisMonth(i.date)&&i.status==='received').reduce((a,i)=>a+Number(i.amount),0);
  const mExp=exps.filter(e=>isThisMonth(e.date)).reduce((a,e)=>a+Number(e.amount),0);
  const dIM=daysInMonth(now.getFullYear(),now.getMonth()+1);
  const dom=now.getDate();const daysLeft=dIM-dom;
  const dailyRate=dom>0?mExp/dom:0;
  const unpaidBills=bills.filter(b=>!(b.paidMonths||[]).includes(thisMonth())&&Number(b.dueDay)>dom);
  const billsRemain=unpaidBills.reduce((a,b)=>a+Number(b.amount),0);
  const projBalance=mInc-mExp-billsRemain-(dailyRate*daysLeft);
  const cut20=mInc-mExp-billsRemain-(dailyRate*0.8*daysLeft);
  const budgets=getBudgets();
  const budgetTotal=budgets.reduce((a,b)=>a+Number(b.limit),0);
  const hitBudget=mInc-budgetTotal;
  const burnPct=mInc>0?(mExp/mInc*100).toFixed(0):0;

  document.getElementById('page-forecast').innerHTML=`
  <h2 class="text-2xl font-bold mb-4">🔮 Month Forecast</h2>
  <div class="card mb-4"><h3 class="font-semibold mb-2">Money Burn Rate</h3>
    <div class="progress-bar" style="height:20px"><div class="progress-fill" style="width:${Math.min(100,burnPct)}%"></div></div>
    <p class="text-sm mt-2">${burnPct}% of income spent with ${daysLeft} days remaining</p>
  </div>
  <div class="grid lg:grid-cols-3 gap-4 mb-6">
    <div class="card"><p class="text-sm opacity-70">Current Rate</p><p class="text-lg font-bold" style="color:#FC809F">${R(projBalance)}</p><p class="text-xs opacity-60">Projected closing balance</p></div>
    <div class="card"><p class="text-sm opacity-70">Cut 20% Spending</p><p class="text-lg font-bold" style="color:#FC809F">${R(cut20)}</p><p class="text-xs opacity-60">If you reduce spending by 20%</p></div>
    <div class="card"><p class="text-sm opacity-70">Hit All Budgets</p><p class="text-lg font-bold" style="color:#FC809F">${R(hitBudget)}</p><p class="text-xs opacity-60">If you stay within all budget limits</p></div>
  </div>
  <div class="card mb-4"><h3 class="font-semibold mb-3">Breakdown</h3>
    <div class="space-y-2 text-sm">
      <div class="flex justify-between"><span>Income received</span><span class="font-medium">${R(mInc)}</span></div>
      <div class="flex justify-between"><span>Already spent</span><span class="font-medium">- ${R(mExp)}</span></div>
      <div class="flex justify-between"><span>Upcoming bills</span><span class="font-medium">- ${R(billsRemain)}</span></div>
      <div class="flex justify-between"><span>Projected spend (${daysLeft} days × ${R(dailyRate)}/day)</span><span class="font-medium">- ${R(dailyRate*daysLeft)}</span></div>
      <div class="flex justify-between border-t pt-2" style="border-color:#FFBCCD"><span class="font-bold">Projected Balance</span><span class="font-bold" style="color:#FC809F">${R(projBalance)}</span></div>
    </div>
  </div>`;
};

  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='moneyhoney_backup.json';a.click();
};
window.importData=function(){
  const file=document.getElementById('importFile').files[0];if(!file)return;
  const reader=new FileReader();reader.onload=function(e){
    try{const d=JSON.parse(e.target.result);
    if(d.settings)saveSettings(d.settings);if(d.incomes)saveIncomes(d.incomes);if(d.expenses)saveExpenses(d.expenses);
    if(d.goals)saveGoals(d.goals);if(d.budgets)saveBudgets(d.budgets);if(d.bills)saveBills(d.bills);
    alert('Data imported successfully! 💕');render_settings();render_dashboard();}catch{alert('Invalid file format')}};
  reader.readAsText(file);
};
window.showClearModal=function(){
  showModal(`<h3 class="text-lg font-bold mb-4">Clear All Data</h3><p class="mb-4">This will permanently delete ALL your data. Are you sure?</p>
  <div class="flex gap-3"><button class="btn w-full" onclick="clearAllData()">Yes, Clear Everything</button><button class="btn btn-outline w-full" onclick="closeModal()">Cancel</button></div>`);
};
window.clearAllData=function(){
  ['settings','incomes','expenses','goals','budgets','bills'].forEach(k=>DB.remove(k));
  closeModal();alert('All data cleared 💕');render_settings();render_dashboard();
};

// ===== INIT =====
render_dashboard();
</script>
</body>
</html>
